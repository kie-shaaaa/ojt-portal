name: Build Verification

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
            - updates

jobs:
    build:
        name:  ${{ matrix.label }} Build
        runs-on: ubuntu-latest
        strategy: 
            fail-fast: false
            matrix:
                include:
                    - label: Backend NTC Internship Portal
                      workdir: backend
                      lint: true
                      test: true

                    - label: Frontend NTC Internship Portal
                      workdir: frontend
                      lint: true
                      test: false
        defaults:
            run:
                working-directory: ${{ matrix.workdir }}
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Setup Nodejs
              uses: actions/setup-node@v4
              with:
                   node-version: 20
                   cache: npm
                   cache-dependency-path: ${{ matrix.workdir }}/package-lock.json

            - name: Installing Dependencies
              working-directory: ${{ matrix.workdir }}
              run: |
                set -eux
                # Try a clean install from lockfile; if lockfile is out-of-sync
                # fall back to a best-effort install to avoid blocking CI.
                npm ci || npm install --legacy-peer-deps

            - name: Lint Checking
              if: matrix.lint == true
              run: npm run lint

            - name: Test
              if: matrix.test == true
              run: npm run test
            
            - name: Build
              run: npm run build